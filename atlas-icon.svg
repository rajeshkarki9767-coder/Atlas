<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1a1e26"/>
<stop offset="100%" stop-color="#0a0c10"/>
</linearGradient>
<linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#e8b660"/>
<stop offset="100%" stop-color="#b8853a"/>
</linearGradient>
<radialGradient id="glow" cx="0.7" cy="0.3" r="0.6">
<stop offset="0%" stop-color="#d4a04a" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#d4a04a" stop-opacity="0"/>
</radialGradient>
</defs>
<!-- Rounded-square background -->
<rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
<rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>
<!-- Decorative concentric arcs -->
<circle cx="256" cy="256" r="200" fill="none" stroke="#d4a04a" stroke-width="1.5" stroke-opacity="0.12"/>
<circle cx="256" cy="256" r="160" fill="none" stroke="#d4a04a" stroke-width="1.5" stroke-opacity="0.08"/>
<!-- Geometric capital A built from 3 shapes:
     1. Left leg (parallelogram from bottom-left to apex)
     2. Right leg (parallelogram from apex to bottom-right)
     3. Horizontal crossbar
     A is centered at x=256, spans y=140..380, width ~200 -->
<!-- Left leg: outer (156,380) → top-left at apex (236,140) → top-right (272,140) → inner bottom (200,380) -->
<polygon points="156,380 236,140 272,140 200,380" fill="url(#acc)"/>
<!-- Right leg: mirror of left leg -->
<polygon points="240,140 276,140 356,380 312,380" fill="url(#acc)"/>
<!-- Crossbar: connects the two legs at ~mid-height -->
<rect x="206" y="262" width="100" height="32" fill="url(#acc)"/>
</svg>
